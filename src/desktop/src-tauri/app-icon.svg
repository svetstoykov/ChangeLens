  <rect x="48" y="48" width="928" height="928" rx="208" fill="url(#background)" />
  <path d="M188 220C304 112 498 82 650 140" fill="none" stroke="#ffffff" stroke-opacity="0.055" stroke-width="28" stroke-linecap="round" />

  <g filter="url(#shadow)">
    <path d="M610 606L806 802" fill="none" stroke="#515a69" stroke-width="132" stroke-linecap="round" />
    <path d="M610 606L806 802" fill="none" stroke="url(#handle)" stroke-width="92" stroke-linecap="round" />
    <circle cx="424" cy="416" r="270" fill="#0b0d11" stroke="#0b0d11" stroke-width="26" />
    <circle cx="424" cy="416" r="242" fill="url(#glass)" stroke="url(#rim)" stroke-width="48" />
  </g>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M300 350H380M340 310V390M428 350H544" stroke="#7ee2a8" stroke-width="42" />
    <path d="M300 486H380M428 486H544" stroke="#ff9b9b" stroke-width="42" />
