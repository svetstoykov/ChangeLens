<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title description">
  <title id="title">ChangeLens application icon</title>
  <desc id="description">A magnifying lens containing green addition and coral removal marks.</desc>
  <defs>
    <linearGradient id="background" x1="160" y1="112" x2="864" y2="912" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#252a35" />
      <stop offset="0.52" stop-color="#171a21" />
      <stop offset="1" stop-color="#0d0f13" />
    </linearGradient>
    <radialGradient id="glass" cx="0" cy="0" r="1" gradientTransform="translate(344 310) rotate(48) scale(470)">
      <stop offset="0" stop-color="#303846" />
      <stop offset="0.68" stop-color="#1a2029" />
      <stop offset="1" stop-color="#12161d" />
    </radialGradient>
    <linearGradient id="rim" x1="248" y1="212" x2="650" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f4f6fa" />
      <stop offset="0.45" stop-color="#c8ced9" />
      <stop offset="1" stop-color="#8f98a8" />
    </linearGradient>
    <linearGradient id="handle" x1="608" y1="600" x2="822" y2="832" gradientUnits="userSpaceOnUse">
